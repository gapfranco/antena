{{define "base"}}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antena App</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

<nav class="bg-white border-b border-slate-200 py-4 shadow-sm">
    <div class="container mx-auto px-4 flex justify-between items-center">
        <div class="flex items-center gap-8">
            <a href="/"><h1 class="text-xl font-bold text-indigo-600 tracking-tight">Signal <span class="text-slate-400 font-light">Antena</span></h1></a>
            
            <div class="flex items-center gap-4 h-10">
                <a href="/events" class="text-sm font-medium transition-colors h-full flex items-center px-1 border-b-2 {{if eq .ActiveMenu "events"}}text-indigo-600 border-indigo-600{{else}}text-slate-600 border-transparent hover:text-indigo-600{{end}}">Eventos</a>
                <a href="/export" class="text-sm font-medium transition-colors h-full flex items-center px-1 border-b-2 {{if eq .ActiveMenu "export"}}text-indigo-600 border-indigo-600{{else}}text-slate-600 border-transparent hover:text-indigo-600{{end}}">Exportar</a>
            </div>
        </div>
    </div>
</nav>
<main id="main-content" class="container mx-auto px-4 py-8 mt-2">
    {{template "main" .}}
</main>

</body>
</html>

{{end}}
