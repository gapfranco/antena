name: Build

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  # Desktop nativo — requer runner no OS alvo (CGo)
  desktop-linux:
    name: Desktop Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Instalar dependências WebKit
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          sudo ln -sf /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc \
                      /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc

      - name: Instalar Tailwind
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          sudo mv tailwindcss-linux-x64 /usr/local/bin/tailwindcss

      - name: Build
        run: make build

      - uses: actions/upload-artifact@v4
        with:
          name: antena-linux
          path: build/antena

  desktop-windows:
    name: Desktop Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Instalar Tailwind
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-windows-x64.exe
          move tailwindcss-windows-x64.exe tailwindcss.exe
        shell: cmd

      - name: Gerar CSS
        run: tailwindcss.exe -i ui\input.css -o ui\static\css\styles.css --minify
        shell: cmd

      - name: Build
        run: |
          $env:PATH = "C:\mingw64\bin;$env:PATH"
          $env:CGO_ENABLED = "1"
          New-Item -ItemType Directory -Force -Path build | Out-Null
          go build -ldflags "-H windowsgui" -o build\antena.exe .\cmd\antena
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: antena-windows
          path: build/antena.exe

  desktop-macos:
    name: Desktop macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Instalar Tailwind
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-macos-arm64
          chmod +x tailwindcss-macos-arm64
          sudo mv tailwindcss-macos-arm64 /usr/local/bin/tailwindcss

      - name: Build
        run: |
          tailwindcss -i ui/input.css -o ui/static/css/styles.css --minify
          mkdir -p build
          go build -o build/antena-mac ./cmd/antena

      - uses: actions/upload-artifact@v4
        with:
          name: antena-macos
          path: build/antena-mac

  # Servidor headless — cross-platform num único runner
  server-all:
    name: Servidor Headless (todas as plataformas)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Instalar Tailwind
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          sudo mv tailwindcss-linux-x64 /usr/local/bin/tailwindcss

      - name: Build servidor (Linux)
        run: make server-linux

      - name: Build servidor (Windows)
        run: make server-windows

      - name: Build servidor (macOS)
        run: make server-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: antena-servidores
          path: |
            build/antena-server_linux
            build/antena-server.exe
            build/antena-server_mac